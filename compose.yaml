services:
  documentflowserver.db:
    image: mysql:8.0
    container_name: db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  documentflowserver.redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  documentflowserver.api:
    image: documentflowserver.api
    container_name: api
    restart: unless-stopped
    depends_on:
      documentflowserver.db:
        condition: service_healthy
      documentflowserver.redis:
        condition: service_healthy
    build:
      context: .
      dockerfile: DocumentFlowServer.Api/Dockerfile
    environment:
      MYSQL_HOST: db
      MYSQL_PORT: ${MYSQL_PORT}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_PORT: ${REDIS_PORT}
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: ${ASPNETCORE_URLS}
      JWT_EXPIRES_MINUTES: ${JWT_EXPIRES_MINUTES}
      Redis__Configuration: "redis:6379,user=default,password=${REDIS_PASSWORD},abortConnect=false"
      Redis__InstanceName: "DocumentFlow:"
    ports:
      - "${WEB_API_PORT}:${CONTAINER_API_PORT}"
    volumes:
      - api_files:/app/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s

  documentflowserver.worker:
    image: documentflowserver.worker
    container_name: worker
    restart: unless-stopped
    depends_on:
      documentflowserver.api:
        condition: service_healthy
      documentflowserver.db:
        condition: service_healthy
      documentflowserver.redis:
        condition: service_healthy
    build:
      context: .
      dockerfile: DocumentFlowServer.Worker/Dockerfile

volumes:
  mysql_data:
    driver: local
    name: documentflow-mysql-data
  redis_data:
    driver: local
    name: documentflow-redis-data
  api_files:
    driver: local
    name: documentflow-api-files